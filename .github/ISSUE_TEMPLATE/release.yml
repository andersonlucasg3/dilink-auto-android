name: Release
description: Cut a new release branch from develop, prepare for main
labels: [release]
body:
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 0.16.0
      description: The release version number (e.g. 0.16.0)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Release Notes
      placeholder: What's included in this release?
    validations:
      required: true
  - type: textarea
    id: fixes
    attributes:
      label: Additional Fixes Needed
      placeholder: Any last-minute fixes to include before the release
    validations:
      required: false
