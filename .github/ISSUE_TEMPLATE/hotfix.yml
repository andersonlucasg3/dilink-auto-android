name: Hotfix
description: Report a critical bug that needs immediate fix from main
labels: [hotfix, agent]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Describe the critical issue and what needs to be fixed urgently.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: '- [ ] The issue is resolved'
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      placeholder: Logs, screenshots, steps to reproduce, or anything that helps.
    validations:
      required: false
