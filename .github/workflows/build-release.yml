name: Build (Release)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '!*dev*'

permissions:
  contents: write

jobs:
  release:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          if [ ! -f "$ANDROID_HOME/platforms/android-34/build.prop" ]; then
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
            mkdir -p $ANDROID_HOME/cmdline-tools/latest
            unzip -q /tmp/cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools/latest
            mv $ANDROID_HOME/cmdline-tools/latest/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/ 2>/dev/null || true
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null
            $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
              "platforms;android-34" \
              "build-tools;34.0.0" \
              > /dev/null
          fi

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew :app-client:assembleRelease
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dilink-auto-client-release
          path: app-client/build/outputs/apk/release/app-client-release.apk

      - name: Create GitHub Release
        run: |
          # Prefer tag from trigger, fall back to git tag --points-at HEAD
          REF="${{ github.ref_name }}"
          if echo "$REF" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            TAG="$REF"
          else
            git fetch --tags origin 2>/dev/null || true
            TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v dev | head -1)
          fi

          if [ -z "$TAG" ]; then
            echo "No release tag on this commit — skipping release"
            exit 0
          fi

          echo "Tag: $TAG"

          gh release create "$TAG" \
            --prerelease=false \
            --title "$TAG" \
            --generate-notes \
            app-client/build/outputs/apk/release/app-client-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
