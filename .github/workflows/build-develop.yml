name: Build (Develop)

on:
  push:
    branches: [develop]
    tags: ['v[0-9]+.[0-9]+.[0-9]+-dev*']
  pull_request:
    branches: [develop]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Set up Android SDK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools/latest
          mv $ANDROID_HOME/cmdline-tools/latest/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/ 2>/dev/null || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            > /dev/null

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew :app-client:assembleDebug
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: dilink-auto-client-debug
          path: app-client/build/outputs/apk/debug/app-client-debug.apk

      - name: Update Dev Prerelease
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION_NAME="${TAG#v}"

          # Strip -NN suffix from both tag and gradle.properties for comparison.
          # gradle.properties mirrors the tag exactly (e.g. 0.17.0-dev-02).
          # Compare base versions: tag base → gradle base (both -dev without -NN).
          TAG_BASE=$(echo "$VERSION_NAME" | sed -E 's/-dev-[0-9]+$/-dev/')
          FILE_VERSION=$(grep 'app.versionName' gradle.properties | sed 's/.*=//')
          FILE_BASE=$(echo "$FILE_VERSION" | sed -E 's/-dev-[0-9]+$/-dev/')

          if [ "$TAG_BASE" != "$FILE_BASE" ]; then
            echo "ERROR: Tag base ($TAG_BASE) does not match gradle.properties base ($FILE_BASE)"
            exit 1
          fi

          VERSION_CODE=$(grep 'app.versionCode' gradle.properties | sed 's/.*=//')

          # Delete old dev prerelease if it exists
          gh release delete "$TAG" --yes 2>/dev/null || true

          # Create new dev prerelease
          gh release create "$TAG" \
            --prerelease \
            --title "Development Build $TAG (code $VERSION_CODE)" \
            --notes "Automated development build.\n\nVersion: $TAG\nVersion code: $VERSION_CODE\nCommit: ${{ github.sha }}" \
            app-client/build/outputs/apk/debug/app-client-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
