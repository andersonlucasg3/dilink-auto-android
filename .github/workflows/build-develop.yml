name: Build (Develop)

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Set up Android SDK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          unzip -q cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools/latest
          mv $ANDROID_HOME/cmdline-tools/latest/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/ 2>/dev/null || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            > /dev/null

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew :app-client:assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: dilink-auto-client-debug
          path: app-client/build/outputs/apk/debug/app-client-debug.apk

      - name: Update Dev Prerelease
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        run: |
          VERSION_NAME=$(grep 'versionName' app-client/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app-client/build.gradle.kts | head -1 | sed 's/[^0-9]*\([0-9]*\).*/\1/')
          TAG="v${VERSION_NAME}"

          # Delete old dev prerelease if it exists
          gh release delete "$TAG" --yes 2>/dev/null || true

          # Create new dev prerelease
          gh release create "$TAG" \
            --prerelease \
            --title "Development Build $TAG (code $VERSION_CODE)" \
            --notes "Automated development build from develop branch.\n\nVersion: $TAG\nVersion code: $VERSION_CODE\nCommit: ${{ github.sha }}" \
            app-client/build/outputs/apk/debug/app-client-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
